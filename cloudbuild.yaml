steps:
  # Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/whitecatbot:$COMMIT_SHA', '.']
  
  # Push the container image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/whitecatbot:$COMMIT_SHA']
    
  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'whitecatbot'
      - '--image'
      - 'gcr.io/$PROJECT_ID/whitecatbot:$COMMIT_SHA'
      - '--region'
      - 'asia-southeast1' # Change this if your region is different!

# Fixes your exact error by forcing Cloud Logging only
options:
  logging: CLOUD_LOGGING_ONLY